<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Action Button Example</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .fab {
            position: fixed;
            right: 48px;
            bottom: 48px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #e21e2d;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
            border: none;
            cursor: pointer;
            z-index: 1000;
        }

        .fab:hover {
            background-color: #c01926;
        }
    </style>
</head>
<body>
    <div id="navigation-container"></div>

    <main style="min-height: 100vh; padding: 2rem;">
        <h1>Floating Action Button Demo</h1>
        <p>This page demonstrates a floating action button positioned 48px from the bottom and right of the viewport.</p>
    </main>

    <button class="fab" aria-label="Floating action button">
        +
    </button>

    <div id="footer-container"></div>

    <script src="components/components.js"></script>
</body>
</html>
