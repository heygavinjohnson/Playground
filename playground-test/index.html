    <aside class="panel" aria-label="Controls">
        <div class="panel__inner">
            <h2 class="panel__title">Button style</h2>

            <fieldset class="panel__group">
                <legend class="panel__legend">Variant</legend>

                <label class="panel__option">
                    <input type="radio" name="variant" value="v1" checked />
                    <span>Version 1</span>
                </label>
                <label class="panel__option">
                    <input type="radio" name="variant" value="v2" />
                    <span>Version 2</span>
                </label>
                <label class="panel__option">
                    <input type="radio" name="variant" value="v3" />
                    <span>Version 3</span>
                </label>
            </fieldset>

            <label class="panel__toggle">
                <span>Centered</span>
                <input id="centeredToggle" type="checkbox" role="switch" aria-label="Centered" />
            </label>
        </div>
    </aside>

    <script>
        const locationEl = document.getElementById("fabLocation");
        const buttonEl = document.getElementById("fabButton");
        const centeredToggle = document.getElementById("centeredToggle");

        function setVariant(next) {
            buttonEl.classList.remove("fab--v1", "fab--v2", "fab--v3");
            buttonEl.classList.add(`fab--${next}`);
        }

        function setCentered(isCentered) {
            locationEl.classList.toggle("centered", isCentered);
            locationEl.classList.toggle("right", !isCentered);
        }

        document.querySelectorAll('input[name="variant"]').forEach((el) => {
            el.addEventListener("change", (e) => {
                setVariant(e.target.value);
            });
        });

        centeredToggle.addEventListener("change", (e) => {
            setCentered(e.target.checked);
        });

        setVariant("v1");
        setCentered(centeredToggle.checked);
    </script>

</html>
